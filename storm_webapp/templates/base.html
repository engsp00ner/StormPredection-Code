<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Storm Prediction{% endblock %}</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="/static/css/custom.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light-subtle">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-semibold" href="/">Storm Prediction</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/alerts/">Alerts</a></li>
                    <li class="nav-item"><a class="nav-link" href="/history/">History</a></li>
                    <li class="nav-item"><a class="nav-link" href="/whatsapp/">WhatsApp</a></li>
                    <li class="nav-item"><a class="nav-link" href="/whatsapp/recipients/">Recipients</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings/">Settings</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2 text-white-50 small">
                    <span id="ws-indicator" class="ws-dot ws-dot--grey"></span>
                    <span>Realtime</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
